version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.simple
    ports:
      - "3001:3001"
    volumes:
      - ./database:/app/database
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./frontend/dist
      dockerfile: ../../Dockerfile.frontend
    ports:
      - "8443:8443"
    restart: unless-stopped
    depends_on:
      - backend